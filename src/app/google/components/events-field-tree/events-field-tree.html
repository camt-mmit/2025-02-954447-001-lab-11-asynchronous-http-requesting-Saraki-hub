@let field = fieldTree();
<fieldset [disabled]="field().disabled()">
  <ng-content select="legend"></ng-content>

  <label>
    <b>Summary</b>
    <input type="text" [formField]="field.summary" placeholder="Event title..." />
  </label>

  <label>
    <b>Description</b>
    <textarea [formField]="field.description" placeholder="Add description..."></textarea>
  </label>

  <fieldset class="allday-section">
    <legend class="allday-legend">
      <label class="checkbox-label">
        <input type="checkbox" [formField]="field.allDay" />
        <span>All Day</span>
      </label>
    </legend>

    <div class="date-row">
      @if (field.allDay().value()) {
        <label>
          <b>Start</b>
          <input type="date" [formField]="field.start" />
        </label>
        <label>
          <b>End</b>
          <input type="date" [formField]="field.end" />
        </label>
      } @else {
        <label>
          <b>Start</b>
          <input type="datetime-local" [formField]="field.start" />
        </label>
        <label>
          <b>End</b>
          <input type="datetime-local" [formField]="field.end" />
        </label>
      }
    </div>
  </fieldset>

  <ng-content></ng-content>
</fieldset>
